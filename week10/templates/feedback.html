{%extends "base.html" %}

{%block title %}Feedback{% endblock %}

{% block content %}
    <h1 class = "text-3xl font-bold mb-4">Feedback</h1>

{% if errors %}
<div class = "bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
    <ul class = "list-disc list-inside">
        {% for error in errors %}
        <li>{{ error }}</li>
        {% endfor %}
    </ul>
</div>
{% endif %}

<form action = "feedback" method = "POST" class = "space-y-4 max-w-md">
    <input name = "name" type = "text" value = "{{ data.name}}" placeholder = "Your Name" class = "w-full border rounded px-3 py-2">

    <select name = "rating" class = "w-full border rounded px-3 py-2">
        <option value = ""> --select province</option>
        {% for province in provinces %}
        <option value = "{{ province.name }}"{% if data.province == province.name %} selected{% endif %}>{{ province.name }}</option>
        {% endfor %}
    </select>

    <textarea name ="feedback" rows ="5" placeholder = "Your Feedback" class = "w-full border rounded px-3 py-2">{{ data.feedback }}</textarea>

    <button class = "bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Submit</button>
</form>
